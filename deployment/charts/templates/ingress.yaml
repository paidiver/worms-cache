apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-ingress"
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- $tls := .Values.ingress.tls | default (list) -}}
  {{- if gt (len $tls) 0 }}
  tls:
    {{- range $entry := $tls }}
    {{- $hosts := ( $entry.hosts | default (list) ) -}}
    {{- if and $entry.secretName (gt (len $hosts) 0) }}
    - secretName: {{ $entry.secretName | quote }}
      hosts:
        {{- range $h := $hosts }}
        {{- if $h }}
        - {{ $h | quote }}
        {{- end }}
        {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: "/{{ .Values.ingress.api.path }}"
            pathType: {{ .Values.ingress.api.pathType }}
            backend:
              service:
                name: "{{ .Release.Name }}-{{ .Values.api.componentName }}-service"
                port:
                  number: {{ .Values.api.service.port }}
